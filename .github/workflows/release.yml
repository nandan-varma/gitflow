name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Retagging (delete + repush) cancels the superseded build instead of
# running two full 4-platform matrices to completion.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''
          - platform: windows-latest
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          # the two macOS jobs otherwise share one auto key and evict each other
          key: ${{ matrix.target }}
          cache-all-crates: true
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: GitFlow Studio ${{ github.ref_name }}
          releaseBody: |
            ## Installation

            - **macOS (Apple Silicon)**: download `GitFlow-Studio_*_aarch64.dmg`
            - **macOS (Intel)**: download `GitFlow-Studio_*_x64.dmg`
            - **Windows**: download `GitFlow-Studio_*_x64-setup.exe`
            - **Linux**: download `.AppImage` (portable) or `.deb` (Debian/Ubuntu)

            > macOS: if Gatekeeper blocks the app, right-click → Open.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
