name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Retagging (delete + repush) cancels the superseded build instead of
# running two full 3-platform matrices to completion.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''
            rust-targets: ''
          - platform: windows-latest
            target: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      # No caching in this workflow: runs happen on tag refs, and caches
      # saved there can never be restored by later tags — pure storage waste.
      # Public-repo minutes are free, so cold builds cost nothing.
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: GitFlow Studio ${{ github.ref_name }}
          releaseBody: |
            ## Installation

            - **macOS (Apple Silicon & Intel)**: download `GitFlow-Studio_*_universal.dmg`
            - **Windows**: download `GitFlow-Studio_*_x64-setup.exe`
            - **Linux**: download `.AppImage` (portable) or `.deb` (Debian/Ubuntu)

            > macOS: if Gatekeeper blocks the app, right-click → Open.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
